<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}{{ site_title }}{% endblock %}</title>
  <meta name="description" content="{% block description %}Discover the best top-rated Fiverr gigs for web development, design, marketing, and more. Curated daily.{% endblock %}"/>

  <!-- Open Graph / Pinterest -->
  <meta property="og:type" content="website"/>
  <meta property="og:site_name" content="{{ site_title }}"/>
  <meta property="og:title" content="{% block og_title %}{{ site_title }} — Top Rated Gigs{% endblock %}"/>
  <meta property="og:description" content="{% block og_description %}Discover top-rated Fiverr gigs curated daily. Web development, design, SEO, marketing &amp; more.{% endblock %}"/>
  <meta property="og:url" content="{% block og_url %}{{ site_url }}/{% endblock %}"/>
  <meta property="og:image" content="{% block og_image %}{{ site_url }}/static/og-default.png{% endblock %}"/>
  <meta property="og:image:width" content="1000"/>
  <meta property="og:image:height" content="1500"/>

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image"/>
  <meta name="twitter:title" content="{% block tw_title %}{{ site_title }}{% endblock %}"/>
  <meta name="twitter:description" content="{% block tw_desc %}Top-rated Fiverr gigs curated daily{% endblock %}"/>
  <meta name="twitter:image" content="{% block tw_image %}{{ site_url }}/static/og-default.png{% endblock %}"/>

  <!-- Pinterest domain verification — replace content value from your Pinterest dashboard -->
  <meta name="p:domain_verify" content="REPLACE_WITH_YOUR_PINTEREST_VERIFY_CODE"/>

  <!-- RSS -->
  <link rel="alternate" type="application/rss+xml" title="{{ site_title }} Feed" href="{{ site_url }}/feed.xml"/>

  <link rel="stylesheet" href="/static/style.css"/>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="/" class="logo">🎯 {{ site_title }}</a>
      <nav>
        <a href="/feed.xml" class="nav-link">📡 RSS Feed</a>
      </nav>
    </div>
  </header>

  <main class="container">
    {% block content %}{% endblock %}
  </main>

  <footer class="site-footer">
    <div class="container">
      <p>
        Curated top-rated Fiverr gigs updated daily. &nbsp;|&nbsp;
        <a href="/feed.xml">RSS Feed</a>
      </p>
      <p class="disclosure">
        This site contains affiliate links. We may earn a commission at no extra cost to you when you hire a freelancer through our links.
      </p>
    </div>
  </footer>
</body>
</html>
